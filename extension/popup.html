<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 260px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a12;
      color: #fff;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 11px;
    }

    .title {
      font-size: 15px;
      font-weight: 600;
    }

    .version {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      margin-left: auto;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .stat {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      padding: 10px;
      border-radius: 6px;
      text-align: center;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      font-variant-numeric: tabular-nums;
    }

    .stat-value.green { color: #22c55e; }
    .stat-value.red { color: #ef4444; }

    .stat-label {
      font-size: 9px;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px;
      margin-bottom: 6px;
    }

    .toggle-label {
      font-size: 12px;
      color: rgba(255,255,255,0.8);
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      transition: 0.2s;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
    }

    .toggle input:checked + .toggle-slider {
      background: #22c55e;
    }

    .toggle input:checked + .toggle-slider:before {
      transform: translateX(16px);
    }

    .legend {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .legend-title {
      font-size: 9px;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 6px;
    }

    .legend-light {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .green { background: #22c55e; box-shadow: 0 0 4px #22c55e; }
    .yellow { background: #eab308; box-shadow: 0 0 4px #eab308; }
    .orange { background: #f97316; box-shadow: 0 0 4px #f97316; }
    .red { background: #ef4444; box-shadow: 0 0 4px #ef4444; }

    .legend-score {
      color: rgba(255,255,255,0.4);
      margin-left: auto;
      font-size: 10px;
    }

    .footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer a {
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      font-size: 11px;
      transition: color 0.15s;
    }

    .footer a:hover {
      color: #22c55e;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: rgba(255,255,255,0.4);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
    }

    .status-dot.offline {
      background: #ef4444;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">DC</div>
    <div class="title">DevCred</div>
    <span class="version">v1.0</span>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value green" id="scanned">0</div>
      <div class="stat-label">Scanned</div>
    </div>
    <div class="stat">
      <div class="stat-value red" id="flagged">0</div>
      <div class="stat-label">Flagged</div>
    </div>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Show Badges</span>
    <label class="toggle">
      <input type="checkbox" id="enabled" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Auto-Scan</span>
    <label class="toggle">
      <input type="checkbox" id="autoScan" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div class="legend">
    <div class="legend-title">Score Guide</div>
    <div class="legend-item">
      <span class="legend-light green"></span>
      <span>Trusted</span>
      <span class="legend-score">600+</span>
    </div>
    <div class="legend-item">
      <span class="legend-light yellow"></span>
      <span>Caution</span>
      <span class="legend-score">300-599</span>
    </div>
    <div class="legend-item">
      <span class="legend-light orange"></span>
      <span>New</span>
      <span class="legend-score">150-299</span>
    </div>
    <div class="legend-item">
      <span class="legend-light red"></span>
      <span>Risky</span>
      <span class="legend-score">&lt;150</span>
    </div>
  </div>

  <div class="footer">
    <a href="https://devcred.fun" target="_blank">devcred.fun</a>
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Connected</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
