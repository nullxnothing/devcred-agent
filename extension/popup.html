<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 280px;
      padding: 16px;
      font-family: 'JetBrains Mono', monospace;
      background: #000000;
      color: #ffffff;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #333333;
    }

    .title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .bracket { color: #666666; }
    .version {
      font-size: 9px;
      color: #666666;
      margin-left: auto;
      padding: 2px 6px;
      border: 1px solid #333333;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .stat {
      background: #111111;
      border: 1px solid #333333;
      padding: 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #ffffff;
    }
    .stat-value.flagged { color: #ff0000; }

    .stat-label {
      font-size: 9px;
      color: #666666;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 4px;
    }

    .section-title {
      font-size: 9px;
      font-weight: 700;
      color: #666666;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
      margin-top: 16px;
    }

    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      background: #0a0a0a;
      border: 1px solid #333333;
      margin-bottom: 6px;
    }

    .toggle-label { font-size: 11px; font-weight: 700; }
    .toggle-desc { font-size: 9px; color: #666666; margin-top: 2px; }

    .toggle {
      position: relative;
      width: 36px;
      height: 18px;
      flex-shrink: 0;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #333333;
      transition: 0.2s;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 12px;
      width: 12px;
      left: 3px;
      bottom: 3px;
      background: #666666;
      transition: 0.2s;
    }

    .toggle input:checked + .toggle-slider { background: #ffffff; }
    .toggle input:checked + .toggle-slider:before {
      transform: translateX(18px);
      background: #000000;
    }

    .legend {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #333333;
    }

    .legend-title {
      font-size: 9px;
      font-weight: 700;
      color: #666666;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      margin-bottom: 6px;
      color: #999999;
    }

    .legend-indicator {
      width: 8px;
      height: 8px;
      flex-shrink: 0;
      border: 1px solid;
    }

    .ind-sovereign { border-color: #ffffff; background: #ffffff; }
    .ind-cleared { border-color: #e5e5e5; background: transparent; }
    .ind-tracked { border-color: #999999; background: transparent; border-style: dashed; }
    .ind-filed { border-color: #737373; background: transparent; border-style: dotted; }
    .ind-flagged { border-color: #ff0000; background: #ff0000; }

    .legend-tier { font-weight: 700; color: #e5e5e5; }
    .legend-score { color: #666666; margin-left: auto; font-size: 9px; }

    .footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #333333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer a {
      color: #999999;
      text-decoration: none;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: color 0.15s;
    }
    .footer a:hover { color: #ffffff; }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 9px;
      color: #666666;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: #ffffff;
    }
    .status-dot.offline { background: #ff0000; }
  </style>
</head>
<body>
  <div class="header">
    <div class="title"><span class="bracket">[</span>BLACKLIST<span class="bracket">]</span></div>
    <span class="version">v1.0</span>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="scanned">0</div>
      <div class="stat-label">SCANNED</div>
    </div>
    <div class="stat">
      <div class="stat-value flagged" id="flagged">0</div>
      <div class="stat-label">FLAGGED</div>
    </div>
  </div>

  <div class="section-title">// DISPLAY OPTIONS</div>

  <div class="toggle-row">
    <div>
      <div class="toggle-label">DOSSIER CARD</div>
      <div class="toggle-desc">Below DA section</div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="showCard" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div class="toggle-row">
    <div>
      <div class="toggle-label">INLINE BADGE</div>
      <div class="toggle-desc">In header bar</div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="showBadge" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div class="toggle-row">
    <div>
      <div class="toggle-label">AUTO-SCAN</div>
      <div class="toggle-desc">Watch for page changes</div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="autoScan" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div class="legend">
    <div class="legend-title">// CLASSIFICATION GUIDE</div>
    <div class="legend-item">
      <span class="legend-indicator ind-sovereign"></span>
      <span class="legend-tier">SOVEREIGN / CLEARED</span>
      <span class="legend-score">600+</span>
    </div>
    <div class="legend-item">
      <span class="legend-indicator ind-cleared"></span>
      <span class="legend-tier">VETTED / TRACKED</span>
      <span class="legend-score">300-599</span>
    </div>
    <div class="legend-item">
      <span class="legend-indicator ind-tracked"></span>
      <span class="legend-tier">FILED</span>
      <span class="legend-score">150-299</span>
    </div>
    <div class="legend-item">
      <span class="legend-indicator ind-flagged"></span>
      <span class="legend-tier">FLAGGED</span>
      <span class="legend-score">&lt;150</span>
    </div>
  </div>

  <div class="footer">
    <a href="https://devkarma.fun" target="_blank">BLACKLIST.FUN</a>
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">ONLINE</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
